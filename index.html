    <script id="ld-json-lodging" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LodgingBusiness",
        "name": "Guest Guide Property",
        "description": "Digital guest guide for hospitality operations.",
        "url": "https://guestguide.hostconnect.app",

    </script>

    <script>
      (function applyMetadataFallback() {
        const defaults = {
          title: 'Guest Guide | Host Connect',
          description: 'Digital guest guide with stay details, useful links and partner services.',
          siteName: 'Guest Guide',
          locale: 'pt_BR',
          url: window.location.origin,
          image: 'https://guestguide.hostconnect.app/og-image.png',
          lodgingName: 'Guest Guide Property',
          lodgingPhone: '+55-00-0000-0000',
          locality: 'Urubici',
          region: 'SC',
          country: 'BR'
        };

        const runtime = window.__GUEST_GUIDE_META__ || {};
        const meta = { ...defaults, ...runtime };

        function setMeta(selector, content) {
          const el = document.querySelector(selector);
          if (el && content) {
            el.setAttribute('content', content);
          }
        }

        document.title = meta.title;
        setMeta('meta[name="description"]', meta.description);
        setMeta('meta[property="og:title"]', meta.title);
        setMeta('meta[property="og:description"]', meta.description);
        setMeta('meta[property="og:site_name"]', meta.siteName);
        setMeta('meta[property="og:locale"]', meta.locale);
        setMeta('meta[property="og:url"]', meta.url);
        setMeta('meta[property="og:image"]', meta.image);
        setMeta('meta[name="twitter:title"]', meta.title);
        setMeta('meta[name="twitter:description"]', meta.description);
        setMeta('meta[name="twitter:image"]', meta.image);

        const ld = document.getElementById('ld-json-lodging');
        if (ld) {
          ld.textContent = JSON.stringify({
            '@context': 'https://schema.org',
            '@type': 'LodgingBusiness',
            name: meta.lodgingName,
            description: meta.description,
            url: meta.url,
            image: meta.image,
            telephone: meta.lodgingPhone,
            address: {
              '@type': 'PostalAddress',
              addressLocality: meta.locality,
              addressRegion: meta.region,
              addressCountry: meta.country
            }
          });
        }
      })();
    </script>

    <link
